steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Cover-Ordner erstellen
    run: mkdir -p covers

  - name: Alle 610 Cover herunterladen
    run: |
      python3 << 'EOF'
      import hashlib, urllib.request, os, time

      headers = {
        'Referer': 'https://de.duckipedia.org/',
        'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36'
      }

      ok, skip = 0, 0
      for n in range(1, 611):
        path = f'covers/LTB_{n}.jpg'
        if os.path.exists(path):
          print(f'  exists {n}')
          continue
        name = f'LTB_{n}.jpg'
        h = hashlib.md5(name.encode()).hexdigest()
        url = f'https://de.duckipedia.org/images/{h[0]}/{h[:2]}/{name}'
        try:
          req = urllib.request.Request(url, headers=headers)
          with urllib.request.urlopen(req, timeout=15) as r:
            data = r.read()
          if len(data) > 1000:
            with open(path, 'wb') as f:
              f.write(data)
            print(f'  OK {n} ({len(data)//1024}KB)')
            ok += 1
          else:
            print(f'  SKIP {n} (zu klein)')
            skip += 1
        except Exception as e:
          print(f'  FEHLER {n}: {e}')
          skip += 1
        time.sleep(0.1)

      print(f'\nErgebnis: {ok} OK, {skip} nicht gefunden')
      EOF

  - name: Cover committen
    run: |
      git config user.name "github-actions[bot]"
      git config user.email "github-actions[bot]@users.noreply.github.com"
      git add covers/
      git diff --staged --quiet && echo "Keine neuen Cover" || (
        COUNT=$(ls covers/*.jpg 2>/dev/null | wc -l)
        git commit -m "🦆 Cover aktualisiert ($COUNT/610)"
        git push
      )
