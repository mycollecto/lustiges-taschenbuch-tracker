name: Cover-Bilder herunterladen

on:
  workflow_dispatch:

jobs:
  download-covers:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cover-Ordner erstellen
        run: |
          mkdir -p covers/haupt
          mkdir -p covers/spezial
          mkdir -p covers/enten
          mkdir -p covers/premium
          mkdir -p covers/ultimat
          mkdir -p covers/maus
          mkdir -p covers/crime
          mkdir -p covers/abenteuer
          mkdir -p covers/history
          mkdir -p covers/fantasy
          mkdir -p covers/galaxy
          mkdir -p covers/europa
          mkdir -p covers/mystery

      - name: Cover herunterladen
        run: |
          python3 << 'EOF'
          import hashlib, urllib.request, os, time

          SERIES = [
            ('haupt', 610, 'LTB_{n}.jpg'),
            ('spezial', 112, 'LTB_Spezial_{n}.jpg'),
            ('enten', 96, 'LTB_Enten-Edition_{n}.jpg'),
            ('premium', 50, 'LTB_Premium_{n}.jpg'),
            ('ultimat', 48, 'LTB_Ultimate_Phantomias_{n}.jpg'),
            ('maus', 30, 'LTB_Maus-Edition_{n}.jpg'),
            ('crime', 30, 'LTB_Crime_{n}.jpg'),
            ('abenteuer', 20, 'LTB_Abenteuer_{n}.jpg'),
            ('history', 6, 'LTB_History_{n}.jpg'),
            ('fantasy', 6, 'LTB_Fantasy_{n}.jpg'),
            ('galaxy', 6, 'LTB_Galaxy_{n}.jpg'),
            ('europa', 6, 'LTB_Europareise_{n}.jpg'),
            ('mystery', 6, 'LTB_Mystery_{n}.jpg'),
          ]

          headers = {'Referer': 'https://de.duckipedia.org/', 'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36'}
          total_ok, total_skip = 0, 0

          for key, count, pattern in SERIES:
            print(f"\n=== {key} ({count} Bände) ===")
            ok, skip = 0, 0
            for n in range(1, count+1):
              path = f'covers/{key}/LTB_{n}.jpg'
              if os.path.exists(path): continue
              fname = pattern.replace('{n}', str(n))
              h = hashlib.md5(fname.encode()).hexdigest()
              url = f'https://de.duckipedia.org/images/{h[0]}/{h[:2]}/{fname}'
              try:
                req = urllib.request.Request(url, headers=headers)
                with urllib.request.urlopen(req, timeout=15) as r:
                  data = r.read()
                if len(data) > 1000:
                  open(path, 'wb').write(data)
                  ok += 1
                else:
                  skip += 1
              except Exception as e:
                skip += 1
              time.sleep(0.08)
            print(f'  {key}: {ok} OK, {skip} nicht gefunden')
            total_ok += ok
            total_skip += skip

          print(f'\nGesamt: {total_ok} OK, {total_skip} nicht gefunden')
          EOF

      - name: Cover committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add covers/
          git diff --staged --quiet && echo "Keine neuen Cover" || (
            COUNT=$(find covers -name "*.jpg" | wc -l)
            git commit -m "🦆 Cover aktualisiert ($COUNT Dateien)"
            git push
          )
